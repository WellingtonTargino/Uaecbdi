<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Up Uaec nas Alturas</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game">

    <div id="score">0</div>

    <div id="bird"></div>

    <!-- Tela inicial -->
    <div id="startScreen">
      <h1>Up Uaec nas Alturas</h1>
      <p>Pressione ESPAÇO ou TOQUE para começar</p>
    </div>

    <!-- Game Over -->
    <div id="gameOver">
      <h1>GAME OVER</h1>
      <p id="finalScore"></p>
      <button onclick="restartGame()">Reiniciar</button>
    </div>

  </div>
  <audio id="jumpSound" src="jump.mp3"></audio>
  <audio id="bgMusic" src="djnoone - Adventures.mp3" loop></audio>

  <script src="script.js"></script>
</body>
</html>
